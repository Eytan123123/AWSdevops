name: CI

# Runs on every push to any branch, and on every PR targeting main
on:
  push:
  pull_request:
    branches: [main]

# Permissions required for this workflow
permissions:
  contents: read         # Read repo files
  pull-requests: write   # Allow posting plan output as a PR comment

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest

    # Run all commands inside the terraform/ directory
    defaults:
      run:
        working-directory: ./terraform

    steps:
      # Pull the repo into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # TEST: code formatting — spacing, indentation, alignment.
      # Fails if any .tf file deviates from canonical Terraform style.
      - name: Terraform fmt
        run: terraform fmt -check -recursive

      # Install tflint (Terraform linter)
      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      # TEST: best practices — unused variables, deprecated syntax,
      # missing required_version, invalid values for AWS resources, etc.
      - name: Run tflint
        run: tflint --recursive

      # TEST: security — open security groups, hardcoded secrets,
      # unencrypted resources, IAM roles with overly broad permissions.
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ./terraform

      # Initialize providers; skip backend (no state needed for plan in CI)
      - name: Terraform Init
        run: terraform init -backend=false

      # TEST: configuration correctness — valid syntax, all references
      # resolve, variables exist, types match. Does not contact AWS.
      - name: Terraform Validate
        run: terraform validate

      # TEST: full plan computation — produces the diff between current
      # state and desired state. AWS provider runs offline via skip_* flags.
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color

      # On PRs, post the plan output as a comment on the PR
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
