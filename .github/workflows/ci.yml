name: CI

# Runs on every push to any branch, and on every PR targeting main
on:
  push:
  pull_request:
    branches: [main]

# Permissions required for this workflow
permissions:
  id-token: write        # Required for OIDC: lets GitHub prove identity to AWS
  contents: read         # Read repo files
  pull-requests: write   # Allow posting plan output as a PR comment

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest

    # Run all commands inside the terraform/ directory
    defaults:
      run:
        working-directory: ./terraform

    steps:
      # Pull the repo into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Fail if any .tf file is not properly formatted
      - name: Terraform fmt
        run: terraform fmt -check -recursive

      # Install tflint (Terraform linter)
      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      # Run tflint on all modules
      - name: Run tflint
        run: tflint --recursive

      # Scan for security issues (open SGs, hardcoded secrets, unencrypted resources)
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ./terraform

      # Authenticate to AWS using OIDC — no long-lived access keys
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Initialize providers; skip backend in CI (no state needed for plan)
      - name: Terraform Init
        run: terraform init -backend=false

      # Validate configuration syntax and references
      - name: Terraform Validate
        run: terraform validate

      # Produce a plan; do not fail the job here so we can still post the output
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      # On PRs, post the plan output as a comment on the PR
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
