name: CD

# Runs only on push to main (i.e. after a PR merge — direct pushes blocked by branch protection)
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  
jobs:
  plan:
    name: Plan & Archive
    runs-on: ubuntu-latest

    # Run all commands inside the terraform/ directory
    defaults:
      run:
        working-directory: ./terraform

    steps:
      # Pull the repo into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: il-central-1

    
      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Initialize providers; skip backend (no state needed for plan)
      - name: Terraform Init
        run: terraform init -migrate-state

      # Produce the plan and save it to a binary file (tfplan).
      # Also produce a human-readable text version for the summary step.
      # The AWS provider runs offline thanks to skip_* flags in main.tf.
      - name: Terraform Plan
        run: |
          terraform plan -no-color -out=tfplan 
          terraform show -no-color tfplan > plan.txt

      # Upload the tfplan file as a workflow artifact for later review
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 30

      # Write a readable summary of the plan to the GitHub Actions job summary page.
      # Using `cat plan.txt` avoids shell-escaping the plan output (which contains
      # parentheses and other characters that would break `echo "${{ ... }}"`).
      - name: Post plan summary
        run: |
          {
            echo "## Terraform Plan Summary"
            echo ""
            echo '```'
            cat plan.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        
        
        
        
