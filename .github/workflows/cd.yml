name: CD

# Runs only on push to main (i.e. after a PR merge — direct pushes blocked by branch protection)
on:
  push:
    branches: [main]

permissions:
  contents: read   # Read repo files

jobs:
  plan:
    name: Plan & Archive
    runs-on: ubuntu-latest

    # Run all commands inside the terraform/ directory
    defaults:
      run:
        working-directory: ./terraform

    steps:
      # Pull the repo into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Override the S3 backend to a local one so Terraform can init without
      # talking to AWS. The S3 backend in main.tf stays as the production
      # configuration; the override applies only here in CI.
      - name: Override backend for CI (local state)
        run: |
          cat > backend_override.tf <<EOF
          terraform {
            backend "local" {}
          }
          EOF

      # Initialize providers and the (now local) backend
      - name: Terraform Init
        run: terraform init

      # Produce the plan and save it to a binary file (tfplan).
      # Also produce a human-readable text version for the summary step.
      # The AWS provider runs offline thanks to skip_* flags in main.tf.
      - name: Terraform Plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      # Upload the tfplan file as a workflow artifact for later review
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 30

      # Write a readable summary of the plan to the GitHub Actions job summary page.
      # Using `cat plan.txt` avoids shell-escaping the plan output (which contains
      # parentheses and other characters that would break `echo "${{ ... }}"`).
      - name: Post plan summary
        run: |
          {
            echo "## Terraform Plan Summary"
            echo ""
            echo '```'
            cat plan.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
